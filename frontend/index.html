<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>YouTube AI Content Generator</h1>

    <select id="category">
        <option value="horror">Horror Story</option>
        <option value="educational">Educational Script</option>
        <option value="shorts">YouTube Shorts</option>
        <option value="hooks">Hooks & Titles</option>
        <option value="seo">SEO Description</option>
    </select>

    <input type="text" id="topic" placeholder="Enter topic">
    <input type="text" id="audience" placeholder="Target audience">
    <input type="text" id="tone" placeholder="Tone">

    <button onclick="generateContent()">Generate</button>
    <button onclick="copyContent()">Copy</button>

    <textarea id="output" readonly></textarea>
</div>

<script src="script.js"></script>
</body>
</html>
